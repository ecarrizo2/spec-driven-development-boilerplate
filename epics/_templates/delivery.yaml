# ─────────────────────────────────────────────────────────────────────────────
# Delivery Manifest: <EPIC_NAME>
# ─────────────────────────────────────────────────────────────────────────────
# Defines the PR tree, merge order, and execution status for a cross-repo epic.
# Created when the first task is activated. Updated throughout execution.
#
# This file lives in: epics/active/N-epic-name/delivery.yaml
# It is the single source of truth for PR structure and merge coordination.
# ─────────────────────────────────────────────────────────────────────────────

metadata:
  epic_id: null
  epic_title: ""
  branching_strategy: independent # independent | stacked
  strategy_rationale: ""
  created: null # YYYY-MM-DD
  last_updated: null # YYYY-MM-DD

# ─────────────────────────────────────────────────────────────────────────────
# PR DAG — each node represents one Pull Request in a specific repo
# ─────────────────────────────────────────────────────────────────────────────
nodes: []
# Example node:
#   - id: "pr-1"
#     task_id: 1                   # References task ID in task-graph.md
#     repo: "awards-api"           # Which repo this PR lives in (must match repos.yaml key)
#     title: ""                    # PR title (conventional commit format)
#     branch: null                 # e.g., feat/PROJ-54368-add-v2-awards-endpoint
#     base: null                   # null = repo's default main branch from repos.yaml
#     depends_on: []               # Other PR node IDs that must merge first
#     status: planned              # planned | branched | draft-pr | in-progress | ready-for-review | merged | abandoned
#     pr_url: null                 # Filled after PR is created
#     pr_number: null              # Filled after PR is created
#     deploy_notes: null           # Lightweight deployment ordering (free text)
#                                  # e.g., "Must be deployed before pr-3 (frontend depends on this endpoint)"
#     how_to_verify: |
#       # Verification instructions for reviewer
#     notes: ""

# ─────────────────────────────────────────────────────────────────────────────
# Merge Order
# Derived from depends_on edges. Groups can merge in parallel within a group.
# Note: In multirepo, merge order may differ from DEPLOYMENT order.
# Use deploy_notes on individual nodes to document deployment sequencing.
# ─────────────────────────────────────────────────────────────────────────────
merge_order: []
# Example:
#   - group: 1
#     description: "Independent — can merge in any order"
#     nodes: ["pr-1", "pr-2"]
#   - group: 2
#     description: "After group 1 merges"
#     nodes: ["pr-3"]

# ─────────────────────────────────────────────────────────────────────────────
# Branching Strategy Reference
# ─────────────────────────────────────────────────────────────────────────────
# independent (default):
#   Every task branches off the target repo's main branch (from repos.yaml).
#   PRs always target that main branch. For cross-repo dependencies, the
#   dependent task waits for the upstream PR to merge and deploy.
#   Pros: Clean PR diffs, simple CI, repos stay decoupled.
#   Cons: Dependent cross-repo tasks can't start until upstream merges.
#
# stacked (within same repo only):
#   Dependent tasks IN THE SAME REPO branch off their predecessor's branch.
#   PRs initially target the predecessor, then retarget main after merge.
#   Cross-repo dependencies always use the independent strategy.
#   Pros: Work starts immediately within a repo.
#   Cons: PR diffs accumulate; if predecessor is rejected, stack is affected.

# ─────────────────────────────────────────────────────────────────────────────
# Negotiations Impact
# ─────────────────────────────────────────────────────────────────────────────
negotiation_impacts: []
# Example:
#   - negotiation_ref: "neg-1"
#     date: 2026-05-20
#     impact: "Added pr-5 in marketplace-fe for new mobile variant"
#     nodes_added: ["pr-5"]
#     nodes_removed: []
#     nodes_resequenced: []

# ─────────────────────────────────────────────────────────────────────────────
# Incidents & Notes
# ─────────────────────────────────────────────────────────────────────────────
incidents: []
# Example:
#   - date: 2026-05-20
#     repo: "awards-api"
#     description: "PR #123 had merge conflicts after main advanced"
#     resolution: "Rebased onto main, resolved conflicts in awards.service.ts"
