# Target repo caller for the hub's notify-hub-verification reusable workflow.
# Copy this file to your target repo's .github/workflows/ directory.
#
# Prerequisites:
#   1. Set HUB_REPO variable in repo settings (org/hub-repo-name)
#   2. Set HUB_CROSS_REPO_TOKEN secret (PAT with repo+workflow scope)
#   3. The hub must have .github/workflows/notify-hub-verification.yml as a reusable workflow

name: Notify Hub Verification

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  call-notify:
    if: startsWith(github.event.pull_request.head.ref, 'feat/') || startsWith(github.event.pull_request.head.ref, 'fix/') || startsWith(github.event.pull_request.head.ref, 'chore/') || startsWith(github.event.pull_request.head.ref, 'refactor/') || startsWith(github.event.pull_request.head.ref, 'docs/') || startsWith(github.event.pull_request.head.ref, 'ci/')
    uses: ${{ vars.HUB_REPO }}/.github/workflows/notify-hub-verification.yml@main
    with:
      hub_repo: ${{ vars.HUB_REPO }}
    secrets:
      HUB_CROSS_REPO_TOKEN: ${{ secrets.HUB_CROSS_REPO_TOKEN }}
