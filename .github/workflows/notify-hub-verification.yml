name: Notify Hub Verification

on:
  workflow_call:
    inputs:
      hub_repo:
        required: true
        type: string
    secrets:
      HUB_CROSS_REPO_TOKEN:
        required: true
      HUB_INTEGRITY_SECRET:
        required: false

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout hub repo (for SDD modules)
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.hub_repo }}
          token: ${{ secrets.HUB_CROSS_REPO_TOKEN }}
          path: .sdd-hub

      - name: Read SDD context
        id: sdd-context
        run: |
          CONTEXT_FILE=".sdd/task-context.yaml"
          if [ ! -f "$CONTEXT_FILE" ] && [ -f .sdd/context.yaml ]; then
            CONTEXT_FILE=".sdd/context.yaml"
          fi

          if [ -f "$CONTEXT_FILE" ]; then
            echo "epic_id=$(grep 'epic_id:' "$CONTEXT_FILE" | sed 's/.*: *\"//;s/\"$//')" >> "$GITHUB_OUTPUT"
            echo "task_id=$(grep 'task_id:' "$CONTEXT_FILE" | sed 's/.*: *\"//;s/\"$//')" >> "$GITHUB_OUTPUT"
            echo "hub_plan_branch=$(grep 'hub_plan_branch:' "$CONTEXT_FILE" | sed 's/.*: *\"//;s/\"$//')" >> "$GITHUB_OUTPUT"
            echo "hub_plan_pr=$(grep 'hub_plan_pr:' "$CONTEXT_FILE" | sed 's/.*: *\"//;s/\"$//')" >> "$GITHUB_OUTPUT"
            echo "has_context=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_context=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract from PR body (fallback)
        id: fallback
        if: steps.sdd-context.outputs.has_context != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = context.payload.pull_request?.body || '';
            const epicId = body.match(/\*\*Epic ID:\*\*\s*([^\n]+)/)?.[1]?.trim() || '';
            const taskId = body.match(/\*\*Task ID:\*\*\s*([^\n]+)/)?.[1]?.trim() || '';
            const hubPlanBranch = body.match(/\*\*Hub plan branch:\*\*\s*([^\n]+)/)?.[1]?.trim() || '';
            const hubPlanPr = body.match(/\*\*Hub plan PR:\*\*\s*([^\n]+)/)?.[1]?.trim() || '';

            core.setOutput('epic_id', epicId);
            core.setOutput('task_id', taskId);
            core.setOutput('hub_plan_branch', hubPlanBranch);
            core.setOutput('hub_plan_pr', hubPlanPr);

      - name: Dispatch verification to hub
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.HUB_CROSS_REPO_TOKEN }}
          script: |
            const { generateIntegrityToken, generateCorrelationId } = require(`${process.env.GITHUB_WORKSPACE}/.sdd-hub/bin/sync-state/audit`);
            const hubRepo = '${{ inputs.hub_repo }}';
            const [hubOwner, hubName] = hubRepo.split('/');

            if (!hubOwner || !hubName) {
              console.log('Cannot parse hub repo from: ' + hubRepo);
              return;
            }

            const epicId = '${{ steps.sdd-context.outputs.epic_id || steps.fallback.outputs.epic_id }}';
            const taskId = '${{ steps.sdd-context.outputs.task_id || steps.fallback.outputs.task_id }}';
            const hubPlanBranch = '${{ steps.sdd-context.outputs.hub_plan_branch || steps.fallback.outputs.hub_plan_branch }}';
            const hubPlanPr = '${{ steps.sdd-context.outputs.hub_plan_pr || steps.fallback.outputs.hub_plan_pr }}';

            if (!epicId || !taskId) {
              console.log('No epic/task context found. Skipping verification notification.');
              return;
            }

            const cid = generateCorrelationId();
            const payload = {
              repository: context.repo.owner + '/' + context.repo.repo,
              pr_number: context.payload.pull_request?.number || '',
              pr_url: context.payload.pull_request?.html_url || '',
              branch: context.payload.pull_request?.head?.ref || '',
              epic_id: epicId,
              task_id: taskId,
              hub_plan_branch: hubPlanBranch,
              hub_plan_pr: hubPlanPr,
              correlation_id: cid,
            };

            payload.integrity_token = generateIntegrityToken(
              process.env.HUB_INTEGRITY_SECRET || '',
              payload
            );

            await github.rest.repos.createDispatchEvent({
              owner: hubOwner,
              repo: hubName,
              event_type: 'verify-pr',
              client_payload: payload,
            });

            console.log('Verification notification dispatched. Correlation ID: ' + cid);
