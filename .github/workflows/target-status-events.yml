name: Target Status Events

on:
  repository_dispatch:
    types: [pr-status-change, task-status-change]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: target-status-${{ github.event.client_payload.epic_id }}-${{ github.event.client_payload.task_id }}
  cancel-in-progress: false

jobs:
  sync-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout hub default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Validate and apply status change
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = require('./bin/workflow-scripts/target-status-events');
            return await workflow.validateAndApplyStatusChange({ github, context, core });

      - name: Commit status updates
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add epics agent-development fallback-sdd .sdd-audit
          git commit -m "chore(sync): update status from target repo event"
          git pull --rebase origin "${{ github.event.repository.default_branch }}"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"

      - name: Trigger epic completion comment
        if: steps.sync-status.outputs.epic_complete == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = require('./bin/workflow-scripts/target-status-events');
            return await workflow.triggerEpicCompletionComment({ github, context, core });
