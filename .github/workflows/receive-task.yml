name: Receive SDD Task

on:
  workflow_call:
    inputs:
      epic_id:
        required: true
        type: string
      task_id:
        required: true
        type: string
      task_name:
        required: true
        type: string
      hub_repo:
        required: true
        type: string
      hub_plan_branch:
        required: true
        type: string
      hub_plan_pr:
        required: true
        type: string
      execution_branch:
        required: true
        type: string
      plan_dir:
        required: false
        type: string
        default: ''
    secrets:
      HUB_CROSS_REPO_TOKEN:
        required: true
      HUB_INTEGRITY_SECRET:
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  receive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout hub repo (for SDD modules)
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.hub_repo }}
          token: ${{ secrets.HUB_CROSS_REPO_TOKEN }}
          path: .sdd-hub

      - name: Verify integrity token
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { verifyIntegrityToken, auditWorkflowStart } = require(`${process.env.GITHUB_WORKSPACE}/.sdd-hub/bin/sync-state/audit`);
            const cid = '${{ github.run_id }}';

            const payload = {};
            for (const key of Object.keys(context.payload.client_payload || {})) {
              if (key !== 'integrity_token') {
                payload[key] = context.payload.client_payload[key];
              }
            }

            const token = context.payload.client_payload?.integrity_token || '';
            const secret = process.env.HUB_INTEGRITY_SECRET || '';

            if (secret && token && !verifyIntegrityToken(secret, token, payload)) {
              console.warn('Integrity token verification failed. Event may not be from the expected hub.');
            }

            auditWorkflowStart({
              correlation_id: cid,
              source: 'receive-task',
              epic_id: '${{ inputs.epic_id }}',
              task_id: '${{ inputs.task_id }}',
              repository: context.repo.owner + '/' + context.repo.repo,
            });

      - name: Create execution branch and SDD context file
        env:
          EXECUTION_BRANCH: ${{ inputs.execution_branch }}
          BASE_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
          EPIC_ID: ${{ inputs.epic_id }}
          TASK_ID: ${{ inputs.task_id }}
          TASK_NAME: ${{ inputs.task_name }}
          HUB_REPO: ${{ inputs.hub_repo }}
          HUB_PLAN_BRANCH: ${{ inputs.hub_plan_branch }}
          HUB_PLAN_PR: ${{ inputs.hub_plan_pr }}
          PLAN_DIR: ${{ inputs.plan_dir }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Delete stale remote branch if it exists from a previous run
          git push origin --delete "${EXECUTION_BRANCH}" 2>/dev/null || true

          git checkout -b "${EXECUTION_BRANCH}" "origin/${BASE_BRANCH}"

          mkdir -p .sdd
          cat > .sdd/task-context.yaml <<YAML
          epic_id: "${EPIC_ID}"
          task_id: "${TASK_ID}"
          task_name: "${TASK_NAME}"
          hub_repo: "${HUB_REPO}"
          hub_plan_branch: "${HUB_PLAN_BRANCH}"
          hub_plan_pr: "${HUB_PLAN_PR}"
          plan_dir: "${PLAN_DIR}"
          created_at: "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          YAML

          # Backward compatibility for existing automation reading .sdd/context.yaml
          cp .sdd/task-context.yaml .sdd/context.yaml

          git add .sdd/task-context.yaml .sdd/context.yaml
          git commit -m "chore(sdd): initialize task ${TASK_ID} context"
          git push origin HEAD:"${EXECUTION_BRANCH}"

      # DEV BOT INTEGRATION POINT (code synthesis):
      # Same mechanism as plan-agent-pickup.yml — calls GitHub Models API (openai/gpt-4o)
      # to generate implementation files from the plan, then commits them to the branch.
      # Replace the MODEL_URL / MODEL_NAME / fetch call if you use a different AI provider.
      - name: Synthesize implementation with AI
        id: ai_code
        env:
          EPIC_ID: ${{ inputs.epic_id }}
          TASK_ID: ${{ inputs.task_id }}
          TASK_NAME: ${{ inputs.task_name }}
          EXECUTION_BRANCH: ${{ inputs.execution_branch }}
          HUB_CROSS_REPO_TOKEN: ${{ secrets.HUB_CROSS_REPO_TOKEN }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');

          const hubRoot = path.join(process.env.GITHUB_WORKSPACE, '.sdd-hub');
          const repoRoot = process.env.GITHUB_WORKSPACE;
          const epicId = process.env.EPIC_ID || '';
          const taskId = process.env.TASK_ID || '';
          const taskName = process.env.TASK_NAME || '';
          const executionBranch = process.env.EXECUTION_BRANCH || '';

          const { resolvePlanManifest, resolveEpicDirectory, readFrontmatterField } = require(path.join(hubRoot, 'bin/sync-state/epic-resolver'));
          const { readText, splitMarkdownFrontmatter } = require(path.join(hubRoot, 'bin/sync-state/_common'));
          const { readTaskGraphTasks } = require(path.join(hubRoot, 'bin/sync-state/task-graph'));

          function bodyOnly(filePath) {
            if (!filePath || !fs.existsSync(filePath)) return '';
            const text = readText(filePath);
            const split = splitMarkdownFrontmatter(text);
            return split.bodyLines.join('\n').trim();
          }

          function clip(text, max = 8000) {
            return String(text || '').slice(0, max);
          }

          // Resolve plan and epic files from the hub checkout
          const manifestPath = resolvePlanManifest(hubRoot, epicId, taskId);
          const planDir = manifestPath ? path.dirname(manifestPath) : null;
          const epicDir = epicId ? resolveEpicDirectory(hubRoot, epicId) : null;

          let taskTitle = taskName;
          let requestFile = '';
          let targetRepo = '';
          if (epicDir) {
            const taskGraphPath = path.join(epicDir, 'task-graph.md');
            if (fs.existsSync(taskGraphPath)) {
              const tasks = readTaskGraphTasks(taskGraphPath);
              const task = tasks.find((t) => String(t.id) === String(taskId));
              if (task) {
                taskTitle = task.title || taskName;
                requestFile = task.request_file || '';
              }
            }
          }
          if (manifestPath) {
            targetRepo = readFrontmatterField(manifestPath, 'target_repo') || '';
          }

          const epicText = clip(epicDir ? bodyOnly(path.join(epicDir, 'epic.md')) : '');
          const taskGraphText = clip(epicDir ? bodyOnly(path.join(epicDir, 'task-graph.md')) : '');
          const requestText = clip((epicDir && requestFile) ? bodyOnly(path.join(epicDir, 'requests', requestFile)) : '');
          const specText = clip(planDir ? (fs.existsSync(path.join(planDir, 'specification.md')) ? readText(path.join(planDir, 'specification.md')) : '') : '');
          const manifestText = clip(manifestPath && fs.existsSync(manifestPath) ? readText(manifestPath) : '');

          // Read the target repo's structure and key files for context
          let repoStructure = '';
          try {
            repoStructure = execSync(
              'find . -type f -not -path "./.git/*" -not -path "./.sdd-hub/*" -not -path "./node_modules/*" | sort | head -60',
              { cwd: repoRoot, encoding: 'utf8' }
            );
          } catch (_) {}

          let packageJson = '';
          const pkgPath = path.join(repoRoot, 'package.json');
          if (fs.existsSync(pkgPath)) {
            packageJson = clip(readText(pkgPath), 2000);
          }

          const prompt = [
            'You are an expert software developer. Implement a task from a Spec-Driven Development (SDD) system.',
            'Generate complete, working implementation files for the task described below.',
            '',
            'Return ONLY strict JSON — no markdown, no explanation, no code fences. Schema:',
            '{',
            '  "summary": "one-line description of what was implemented",',
            '  "files": [',
            '    { "path": "relative/path/from/repo/root", "content": "complete file content" }',
            '  ]',
            '}',
            '',
            `Task ID: ${taskId}`,
            `Task: ${taskTitle}`,
            `Target Repo: ${targetRepo || 'sdd-test-api'}`,
            '',
            '## Epic',
            epicText || '(none)',
            '',
            '## Task Request',
            requestText || '(none)',
            '',
            '## Implementation Plan / Specification',
            specText || '(none)',
            '',
            '## Plan Manifest',
            manifestText || '(none)',
            '',
            '## Existing Repository Structure',
            repoStructure || '(empty repo)',
            '',
            '## package.json',
            packageJson || '(not found)',
            '',
            'Rules:',
            '- Generate ONLY files needed for this specific task (not the entire app).',
            '- Use files_to_touch from the manifest as your guide for which files to create/modify.',
            '- Write complete file contents — not diffs or snippets.',
            '- Match conventions in existing files (indentation, module style, etc.).',
            '- If the plan includes verification steps, add the corresponding test file.',
            '- Do NOT include .sdd/task-context.yaml or .sdd/context.yaml — context already exists.',
          ].join('\n');

          async function run() {
            const MODEL_URL = 'https://models.github.ai/inference/chat/completions';
            const MODEL_NAME = 'openai/gpt-4o';
            let parsed = null;
            let lastErr = '';

            for (let attempt = 1; attempt <= 3; attempt += 1) {
              try {
                const response = await fetch(MODEL_URL, {
                  method: 'POST',
                  headers: {
                    Authorization: `Bearer ${process.env.HUB_CROSS_REPO_TOKEN}`,
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({
                    model: MODEL_NAME,
                    messages: [
                      { role: 'system', content: 'You are an SDD implementation agent. Output JSON only.' },
                      { role: 'user', content: prompt },
                    ],
                    temperature: 0.2,
                    max_tokens: 4000,
                  }),
                  signal: AbortSignal.timeout(120000),
                });
                if (!response.ok) {
                  const body = await response.text().catch(() => '');
                  throw new Error(`HTTP ${response.status}: ${body.slice(0, 200)}`);
                }
                const data = await response.json();
                const raw = String(data.choices?.[0]?.message?.content || '').trim();
                const fenced = raw.match(/^```(?:json)?\s*([\s\S]*?)\s*```$/i);
                const jsonText = fenced ? fenced[1].trim() : raw;
                parsed = JSON.parse(jsonText);
                break;
              } catch (err) {
                lastErr = String(err.message || err);
                console.error(`Attempt ${attempt} failed: ${lastErr}`);
                if (attempt < 3) await new Promise((r) => setTimeout(r, [10000, 25000][attempt - 1]));
              }
            }

            if (!parsed || !Array.isArray(parsed.files)) {
              fs.appendFileSync(process.env.GITHUB_OUTPUT, `ai_ok=false\nai_summary=AI code synthesis failed: ${lastErr.replace(/\n/g, ' ')}\n`);
              console.error('AI code synthesis failed — PR will be opened with context file only.');
              return;
            }

            // Write generated files
            let written = 0;
            for (const file of parsed.files) {
              if (!file.path || typeof file.content !== 'string') continue;
              // Safety: prevent path traversal
              const resolved = path.resolve(repoRoot, file.path);
              if (!resolved.startsWith(repoRoot + path.sep) && resolved !== repoRoot) continue;
              fs.mkdirSync(path.dirname(resolved), { recursive: true });
              fs.writeFileSync(resolved, file.content, 'utf8');
              written += 1;
            }

            if (written === 0) {
              fs.appendFileSync(process.env.GITHUB_OUTPUT, `ai_ok=false\nai_summary=AI returned no valid files\n`);
              return;
            }

            // Commit implementation
            execSync('git add -A', { cwd: repoRoot, stdio: 'inherit' });
            const changedOutput = execSync('git diff --cached --name-only', { cwd: repoRoot, encoding: 'utf8' });
            if (changedOutput.trim()) {
              execSync(`git commit -m "feat(sdd): AI-generated implementation for task ${taskId}"`, { cwd: repoRoot, stdio: 'inherit' });
              execSync(`git push origin HEAD:"${executionBranch}"`, { cwd: repoRoot, stdio: 'inherit' });
            }

            const summary = String(parsed.summary || `${written} file(s) generated`).replace(/\n/g, ' ');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `ai_ok=true\nai_summary=${summary}\n`);
            console.log(`AI synthesis completed: ${summary}`);
          }

          run().catch((err) => {
            fs.appendFileSync(process.env.GITHUB_OUTPUT || '/dev/null', `ai_ok=false\nai_summary=AI synthesis crashed: ${String(err.message || err).replace(/\n/g, ' ')}\n`);
            console.error('AI synthesis crashed:', err);
          });
          NODE

      - name: Open draft PR
        id: open-pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.HUB_CROSS_REPO_TOKEN }}
          script: |
            const aiOk = '${{ steps.ai_code.outputs.ai_ok }}' === 'true';
            const aiSummary = '${{ steps.ai_code.outputs.ai_summary }}' || 'AI synthesis skipped.';

            const prBody = [
              '## SDD Task Context',
              '',
              `**Epic ID:** ${{ inputs.epic_id }}`,
              `**Task ID:** ${{ inputs.task_id }}`,
              `**Task Name:** ${{ inputs.task_name }}`,
              `**Hub plan PR:** ${{ inputs.hub_repo }}#${{ inputs.hub_plan_pr }}`,
              `**Hub plan branch:** ${{ inputs.hub_plan_branch }}`,
              '',
              '---',
              '',
              aiOk
                ? `✅ **AI implementation generated** — ${aiSummary}`
                : `⚠️ **AI synthesis did not complete** — ${aiSummary} Review and implement manually.`,
              '',
              'Context files: `.sdd/task-context.yaml` (primary) and `.sdd/context.yaml` (compatibility alias)',
              '',
              'This PR was auto-created by the SDD hub automation.',
            ].join('\n');

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `feat(sdd): [${{ inputs.task_id }}] ${{ inputs.task_name }}`,
              head: '${{ inputs.execution_branch }}',
              base: context.payload.repository?.default_branch || 'main',
              body: prBody,
              draft: true,
            });

            core.setOutput('pr_number', String(pr.data.number));
            core.setOutput('pr_url', pr.data.html_url);

      - name: Notify hub of PR creation
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.HUB_CROSS_REPO_TOKEN }}
          script: |
            const { generateCorrelationId } = require(`${process.env.GITHUB_WORKSPACE}/.sdd-hub/bin/sync-state/audit`);
            const hubRepo = '${{ inputs.hub_repo }}';
            const [hubOwner, hubName] = hubRepo.split('/');

            if (!hubOwner || !hubName) {
              console.log('Cannot parse hub repo from: ' + hubRepo);
              return;
            }

            const correlationId = generateCorrelationId();
            await github.rest.repos.createDispatchEvent({
              owner: hubOwner,
              repo: hubName,
              event_type: 'pr-status-change',
              client_payload: {
                epic_id: '${{ inputs.epic_id }}',
                task_id: '${{ inputs.task_id }}',
                status: 'draft-pr',
                layer: 'delivery',
                hub_plan_pr: '${{ inputs.hub_plan_pr }}',
                pr_url: '${{ steps.open-pr.outputs.pr_url }}',
                pr_number: '${{ steps.open-pr.outputs.pr_number }}',
                branch: '${{ inputs.execution_branch }}',
                repository: context.repo.owner + '/' + context.repo.repo,
                correlation_id: correlationId,
              },
            });

            console.log(`Hub notification dispatched. Correlation ID: ${correlationId}`);
