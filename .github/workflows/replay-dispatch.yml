name: Replay Missed Dispatch

on:
  workflow_dispatch:
    inputs:
      epic_id:
        required: true
        type: string
        description: 'Epic ID to replay'
      task_id:
        required: true
        type: string
        description: 'Task ID to replay'

permissions:
  contents: read

jobs:
  replay:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout hub
        uses: actions/checkout@v4

      - name: Replay task dispatch
        uses: actions/github-script@v7
        env:
          EPIC_ID: ${{ inputs.epic_id }}
          TASK_ID: ${{ inputs.task_id }}
          HUB_INTEGRITY_SECRET: ${{ secrets.HUB_INTEGRITY_SECRET }}
        with:
          github-token: ${{ secrets.HUB_CROSS_REPO_TOKEN }}
          script: |
            const workflow = require('./bin/workflow-scripts/replay-dispatch');
            return await workflow.replayTaskDispatch({ github, context, core });

      - name: Summary
        run: |
          echo "Replay dispatched for epic ${{ inputs.epic_id }}, task ${{ inputs.task_id }}."
