name: Epic Approval Sync

on:
  pull_request_review:
    types: [submitted]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: epic-approval-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  sync:
    if: github.event.review.state == 'approved' && startsWith(github.event.pull_request.head.ref, 'epic/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout epic branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Discover epic context
        id: discover
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = require('./bin/workflow-scripts/epic-approval');
            return await workflow.discoverEpicContext({ context, core });

      - name: Create GitHub Issues and Jira tickets
        id: tickets
        uses: actions/github-script@v7
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          EPIC_ID: ${{ steps.discover.outputs.epic_id }}
          EPIC_TITLE: ${{ steps.discover.outputs.epic_title }}
          TASK_GRAPH_PATH: ${{ steps.discover.outputs.task_graph_path }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = require('./bin/workflow-scripts/epic-approval');
            return await workflow.createGitHubIssuesAndJiraTickets({
              github,
              context,
              core,
              inputs: {
                epicId: process.env.EPIC_ID,
                epicTitle: process.env.EPIC_TITLE,
                taskGraphPath: process.env.TASK_GRAPH_PATH,
              },
            });

      - name: Record ticket IDs in task graph
        uses: actions/github-script@v7
        env:
          EPIC_ID: ${{ steps.discover.outputs.epic_id }}
          TICKET_MAP: ${{ steps.tickets.outputs.mapping }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = require('./bin/workflow-scripts/epic-approval');
            return await workflow.recordTicketIdsInTaskGraph({
              inputs: {
                epicId: process.env.EPIC_ID,
                mappingJson: process.env.TICKET_MAP,
              },
            });

      - name: Commit tracking updates
        env:
          EPIC_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          if git diff --quiet; then
            echo "No tracking changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.discover.outputs.task_graph_path }}"
          git commit -m "chore(epic): record ticket links for ${{ steps.discover.outputs.epic_title }}"
          git push origin "HEAD:${EPIC_BRANCH}"

      - name: Set epic status to active
        uses: actions/github-script@v7
        env:
          EPIC_DIR: ${{ steps.discover.outputs.epic_dir }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = require('./bin/workflow-scripts/epic-approval');
            return await workflow.setEpicStatusActive({
              inputs: {
                epicDir: process.env.EPIC_DIR,
              },
            });

      - name: Transition Jira epic
        if: env.JIRA_BASE_URL != '' && env.JIRA_API_TOKEN != ''
        env:
          EPIC_DIR: ${{ steps.discover.outputs.epic_dir }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = require('./bin/workflow-scripts/epic-approval');
            return await workflow.transitionJiraEpic({
              inputs: {
                epicDir: process.env.EPIC_DIR,
              },
            });
