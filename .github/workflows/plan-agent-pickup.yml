name: Plan Agent Pickup

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
  workflow_dispatch:
    inputs:
      plan_branch:
        description: "Plan branch to process (e.g. plan/2_task-name)"
        required: true
        type: string
      pr_number:
        description: "PR number for checks/comments (optional)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  checks: write
  models: read

concurrency:
  group: plan-agent-${{ github.event.pull_request.number || github.event.inputs.plan_branch }}
  cancel-in-progress: false

jobs:
  pickup:
    if: (github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref, 'plan/')) || (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.plan_branch, 'plan/'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workflow scripts from main
        uses: actions/checkout@v4
        with:
          ref: main
          path: workflow-main
          fetch-depth: 1

      - name: Checkout plan branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.plan_branch || github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Discover plan context
        id: discover
        uses: actions/github-script@v7
        env:
          BRANCH_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.plan_branch || github.event.pull_request.head.ref }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = require('./workflow-main/bin/workflow-scripts/plan-agent-pickup');
            return await workflow.discoverPlanContext({ context, core });

      # DEV BOT INTEGRATION POINT (plan synthesis):
      # Replace this step if your internal "Dev Bot" should generate plan content instead of GitHub Models.
      # Keep the outputs contract:
      #   ai_ok=true|false
      #   ai_plan_b64=<base64 JSON with summary/implementation_steps/files_to_touch/verification_steps/risks/open_questions>
      #   ai_message=<status text>
      - name: Synthesize plan with AI
        id: ai_plan
        if: steps.discover.outputs.found == 'true'
        env:
          MANIFEST_PATH: ${{ steps.discover.outputs.manifest_path }}
          PLAN_DIR: ${{ steps.discover.outputs.plan_dir }}
          EPIC_ID: ${{ steps.discover.outputs.epic_id }}
          TASK_ID: ${{ steps.discover.outputs.task_id }}
          TASK_TITLE: ${{ steps.discover.outputs.task_title }}
          TARGET_REPO: ${{ steps.discover.outputs.target_repo }}
          REQUEST_FILE: ${{ steps.discover.outputs.request_file }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = require('./workflow-main/bin/workflow-scripts/plan-agent-pickup');
            return await workflow.synthesizePlanWithAI({ context, core });

      - name: Apply AI synthesis to plan artifacts
        if: steps.discover.outputs.found == 'true' && steps.ai_plan.outputs.ai_ok == 'true'
        env:
          MANIFEST_PATH: ${{ steps.discover.outputs.manifest_path }}
          PLAN_DIR: ${{ steps.discover.outputs.plan_dir }}
          AI_PLAN_B64: ${{ steps.ai_plan.outputs.ai_plan_b64 }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = require('./workflow-main/bin/workflow-scripts/plan-agent-pickup');
            return await workflow.applyAiSynthesis({ context, core });

      - name: Commit agent updates
        if: steps.discover.outputs.found == 'true' && steps.ai_plan.outputs.ai_ok == 'true'
        run: |
          if git diff --quiet; then
            echo "No agent updates to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.discover.outputs.plan_dir }}"
          git commit -m "chore(plan): agent pickup for task ${{ steps.discover.outputs.task_id }}"
          git push origin "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.plan_branch || github.event.pull_request.head.ref }}"

      - name: Publish pickup check
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pr_number || github.event.pull_request.number }}
          FOUND: ${{ steps.discover.outputs.found }}
          AI_OK: ${{ steps.ai_plan.outputs.ai_ok }}
          TASK_ID: ${{ steps.discover.outputs.task_id }}
          DISCOVER_MESSAGE: ${{ steps.discover.outputs.message }}
          AI_MESSAGE: ${{ steps.ai_plan.outputs.ai_message }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = require('./workflow-main/bin/workflow-scripts/plan-agent-pickup');
            return await workflow.publishPickupCheck({ github, context, core });

      - name: Comment pickup status
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pr_number || github.event.pull_request.number }}
          FOUND: ${{ steps.discover.outputs.found }}
          AI_OK: ${{ steps.ai_plan.outputs.ai_ok }}
          TASK_ID: ${{ steps.discover.outputs.task_id }}
          EPIC_ID: ${{ steps.discover.outputs.epic_id }}
          TARGET_REPO: ${{ steps.discover.outputs.target_repo }}
          DISCOVER_MESSAGE: ${{ steps.discover.outputs.message }}
          AI_MESSAGE: ${{ steps.ai_plan.outputs.ai_message }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = require('./workflow-main/bin/workflow-scripts/plan-agent-pickup');
            return await workflow.commentPickupStatus({ github, context, core });
