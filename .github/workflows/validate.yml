name: Hub Validation

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: ['**']

jobs:
  validate:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    name: YAML, Frontmatter & Schema Validation
    outputs:
      is_sdd: ${{ steps.detect.outputs.is_sdd }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate YAML and frontmatter
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execFileSync } = require('child_process');

            const errors = [];

            function walk(dir, fileList = []) {
              if (!fs.existsSync(dir)) return fileList;
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                if (entry.name === '.git' || entry.name === 'node_modules' || entry.name === '_templates') continue;
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) {
                  walk(full, fileList);
                } else {
                  fileList.push(full);
                }
              }
              return fileList;
            }

            const changedFiles = [];
            const prFiles = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            for (const file of prFiles) {
              changedFiles.push(file.filename);
            }

            console.log(`Changed files: ${changedFiles.length}`);

            for (const file of changedFiles) {
              const ext = path.extname(file).toLowerCase();
              const basename = path.basename(file).toLowerCase();

              if (!['.yml', '.yaml', '.md'].includes(ext) && basename !== 'manifest.yaml') continue;
              if (!fs.existsSync(file)) continue;

              try {
                const text = fs.readFileSync(file, 'utf8');

                if (file.endsWith('manifest.yaml') && !file.includes('/_templates/')) {
                  const requiredFields = ['plan_metadata', 'task_id', 'task_name', 'status'];
                  for (const field of requiredFields) {
                    if (!text.includes(field + ':')) {
                      errors.push(`${file}: missing required field '${field}'`);
                    }
                  }
                  const statusMatch = text.match(/status:\s*([^\n\s#]+)/);
                  if (statusMatch) {
                    const validStatuses = ['draft', 'pending-approval', 'approved', 'in-progress', 'done', 'failed', 'paused'];
                    if (!validStatuses.includes(statusMatch[1])) {
                      errors.push(`${file}: invalid status '${statusMatch[1]}'. Valid: ${validStatuses.join(', ')}`);
                    }
                  }
                }

                if (file.endsWith('.md') && (file.includes('epics/') || file.includes('fallback-sdd/') || file.includes('agent-development/'))) {
                  const fmMatch = text.match(/^---\n([\s\S]*?)\n---/);
                  if (fmMatch) {
                    const frontmatter = fmMatch[1];
                    if (!/^[A-Za-z0-9_]+:\s/.test(frontmatter.trim().split('\n')[0])) {
                      errors.push(`${file}: frontmatter appears malformed`);
                    }
                  }
                }

                if (file.endsWith('delivery.yaml')) {
                  if (!text.includes('nodes:') && !text.includes('nodes: []')) {
                    errors.push(`${file}: delivery.yaml missing 'nodes' section`);
                  }
                  if (!text.includes('epic_id:')) {
                    errors.push(`${file}: delivery.yaml missing 'epic_id' field`);
                  }
                }
              } catch (err) {
                errors.push(`${file}: failed to read — ${err.message}`);
              }
            }

            if (errors.length > 0) {
              console.error('Validation errors:');
              for (const err of errors) {
                console.error(`  - ${err}`);
              }
              core.setFailed(`${errors.length} validation error(s) found.`);
            } else {
              console.log('All validations passed.');
            }

      - name: Detect SDD context
        id: detect
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.payload.pull_request.head.ref;
            const body = context.payload.pull_request.body || '';

            const isEpicOrPlan = branch.startsWith('epic/') || branch.startsWith('plan/');
            const execPattern = /^(feat|fix|chore|hotfix|refactor|docs|ci)\/[A-Z][A-Z0-9]+-\d+_.+$/;
            const hasSddMetadata = /Epic ID:|Task ID:|Hub plan PR:|Target repo PR:|\.sdd\/context\.yaml/.test(body);
            const isSdd = isEpicOrPlan || (execPattern.test(branch) && hasSddMetadata);

            core.setOutput('is_sdd', String(isSdd));
            core.info(`SDD context: ${isSdd ? 'yes' : 'no'} (branch: ${branch})`);

      - name: Validate branch naming on PR
        if: always() && steps.detect.outputs.is_sdd == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.payload.pull_request.head.ref;
            const issues = [];

            if (branch.startsWith('main') || branch.startsWith('master')) {
              return;
            }

            const validPrefixes = ['epic/', 'plan/', 'feat/', 'fix/', 'chore/', 'hotfix/', 'refactor/', 'docs/', 'ci/'];
            const hasValidPrefix = validPrefixes.some(p => branch.startsWith(p));

            if (!hasValidPrefix) {
              issues.push(`Branch "${branch}" does not start with a recognized prefix. Expected one of: ${validPrefixes.join(', ')}`);
            }

            if (issues.length > 0) {
              for (const issue of issues) {
                core.warning(issue);
              }
            } else {
              console.log(`Branch "${branch}" naming looks valid.`);
            }

      - name: Validate cross-references on hub PRs
        if: always() && (startsWith(github.event.pull_request.head.ref, 'plan/') || startsWith(github.event.pull_request.head.ref, 'epic/'))
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const path = require('path');
            const { getDeliveryNodeById } = require(path.join(process.cwd(), 'bin/sync-state/epic-resolver'));

            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const branch = pr.head.ref;
            const epicMatch = body.match(/\*\*Epic ID:\*\*\s*([^\n]+)/);
            const taskMatch = body.match(/\*\*Task ID:\*\*\s*([^\n]+)/);
            const branchTask = branch.startsWith('plan/') ? (branch.replace(/^plan\//, '').split(/[_-]/)[0] || '') : '';
            const epicId = epicMatch ? epicMatch[1].trim() : '';
            const taskId = taskMatch ? taskMatch[1].trim() : branchTask;
            const node = epicId && taskId ? getDeliveryNodeById(process.cwd(), epicId, taskId) : null;
            const targetRepoLinkPublished = !!(node && node.pr_url);

            if (branch.startsWith('plan/')) {
              const hasTargetRef = /\*\*Target repo PR:\*\*/.test(body);
              if (targetRepoLinkPublished && !hasTargetRef) {
                core.warning('Plan PR is missing Target repo PR cross-reference. Add: **Target repo PR:** <org>/<repo>#<number>');
              }
            }
