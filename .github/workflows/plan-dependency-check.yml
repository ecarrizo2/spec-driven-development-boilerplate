name: Plan Dependency Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  check_dependencies:
    if: startsWith(github.event.pull_request.head.ref, 'plan/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Discover plan context
        id: discover
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = require('./bin/workflow-scripts/plan-dependency-check');
            return await workflow.discoverPlanContext({ context, core });

      - name: Check task dependencies
        id: check_deps
        if: steps.discover.outputs.epic_id != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = require('./bin/workflow-scripts/plan-dependency-check');
            return await workflow.checkTaskDependencies({
              context, core,
              inputs: {
                epicId: '${{ steps.discover.outputs.epic_id }}',
                taskId: '${{ steps.discover.outputs.task_id }}',
              },
            });

      - name: Create check run
        if: steps.discover.outputs.epic_id != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = require('./bin/workflow-scripts/plan-dependency-check');
            return await workflow.createDepsCheckRun({
              github, context, core,
              inputs: {
                depsOk: '${{ steps.check_deps.outputs.deps_ok }}',
                taskId: '${{ steps.discover.outputs.task_id }}',
                blockedBy: '${{ steps.check_deps.outputs.blocked_by }}',
                message: '${{ steps.check_deps.outputs.message }}',
              },
            });

      - name: Comment on PR
        if: steps.discover.outputs.epic_id != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = require('./bin/workflow-scripts/plan-dependency-check');
            return await workflow.commentDepsStatus({
              github, context, core,
              inputs: {
                depsOk: '${{ steps.check_deps.outputs.deps_ok }}',
                message: '${{ steps.check_deps.outputs.message }}',
              },
            });

      - name: Block approval if dependencies not met
        if: steps.discover.outputs.epic_id != '' && steps.check_deps.outputs.deps_ok != 'true'
        run: |
          echo "::error::Task ${{ steps.discover.outputs.task_id }} is blocked by dependencies: ${{ steps.check_deps.outputs.blocked_by }}"
          echo "This plan cannot be approved until all dependencies are completed."
          exit 1
