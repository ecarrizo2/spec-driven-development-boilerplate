name: Preflight Check

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: ['**']

permissions:
  contents: read
  checks: write

jobs:
  detect-sdd:
    runs-on: ubuntu-latest
    outputs:
      is_sdd: ${{ steps.check.outputs.is_sdd }}
    steps:
      - id: check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.payload.pull_request.head.ref;
            const body = context.payload.pull_request.body || '';

            const isEpicOrPlan = branch.startsWith('epic/') || branch.startsWith('plan/');
            const execPattern = /^(feat|fix|chore|hotfix|refactor|docs|ci)\/[A-Z][A-Z0-9]+-\d+_.+$/;
            const hasSddMetadata = /Epic ID:|Task ID:|Hub plan PR:|Target repo PR:|\.sdd\/context\.yaml/.test(body);
            const isSdd = isEpicOrPlan || (execPattern.test(branch) && hasSddMetadata);

            core.setOutput('is_sdd', String(isSdd));

  config:
    name: Config & Secrets Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate config files
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const { SddError, toCheckAnnotation } = require(path.join(process.cwd(), 'bin/sync-state/errors'));
            const { readYamlScalar } = require(path.join(process.cwd(), 'bin/sync-state/_common'));

            const annotations = [];
            const errors = [];

            const requiredFiles = [
              { path: 'config/repos.yaml', description: 'Repository registry' },
              { path: 'config/teams.yaml', description: 'Team configuration' },
            ];

            for (const file of requiredFiles) {
              if (!fs.existsSync(file.path)) {
                const err = new SddError('SDD-001', {
                  file: file.path,
                  correlation_id: process.env.GITHUB_RUN_ID || '',
                });
                annotations.push(toCheckAnnotation(err));
                errors.push(`Missing required file: ${file.path} (${file.description})`);
              }
            }

            if (fs.existsSync('config/repos.yaml')) {
              const reposText = fs.readFileSync('config/repos.yaml', 'utf8');
              if (!reposText.includes('repositories:') && !reposText.includes('repos:')) {
                const err = new SddError('SDD-001', { file: 'config/repos.yaml', line: 1 });
                annotations.push(toCheckAnnotation(err));
                errors.push('config/repos.yaml: missing top-level "repositories" key');
              }
            }

            if (fs.existsSync('config/teams.yaml')) {
              const teamsText = fs.readFileSync('config/teams.yaml', 'utf8');
              if (!teamsText.includes('active_team:')) {
                const err = new SddError('SDD-001', { file: 'config/teams.yaml', line: 1 });
                annotations.push(toCheckAnnotation(err));
                errors.push('config/teams.yaml: missing "active_team" field');
              }
              if (!teamsText.includes('project_key:')) {
                const err = new SddError('SDD-001', { file: 'config/teams.yaml', line: 1 });
                annotations.push(toCheckAnnotation(err));
                errors.push('config/teams.yaml: missing Jira "project_key" — Jira integration will be skipped');
              }
              if (!teamsText.includes('branching:')) {
                const err = new SddError('SDD-001', { file: 'config/teams.yaml', line: 1 });
                annotations.push(toCheckAnnotation(err));
                errors.push('config/teams.yaml: missing "branching" section');
              }
            }

            const pr = context.payload.pull_request;
            const branch = pr.head.ref;
            const isSdd = '${{ needs.detect-sdd.outputs.is_sdd }}' === 'true';

            if (!isSdd) {
              core.info('Non-SDD PR — skipping cross-reference and branch naming checks.');
              const checkName = 'SDD Preflight';
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: checkName,
                head_sha: pr.head.sha,
                status: 'completed',
                conclusion: 'success',
                output: {
                  title: 'Preflight skipped (non-SDD PR)',
                  summary: 'Branch is not an SDD-managed branch. Config and schema checks still apply.',
                  annotations: annotations.slice(0, 50),
                },
              });
              return;
            }

            if (branch.startsWith('plan/')) {
              const hasTargetPr = /\*\*Target repo PR:\*\*/.test(pr.body || '');
              if (!hasTargetPr) {
                const err = new SddError('SDD-011', { file: 'PR description', line: 1 });
                annotations.push(toCheckAnnotation(err));
              }
            }

            const execPrefixes = ['feat/', 'fix/', 'chore/', 'hotfix/', 'refactor/', 'docs/', 'ci/'];
            const isExec = execPrefixes.some(p => branch.startsWith(p));
            if (isExec) {
              const hasHubPr = /\*\*Hub plan PR:\*\*/.test(pr.body || '');
              if (!hasHubPr) {
                const err = new SddError('SDD-012', { file: 'PR description', line: 1 });
                annotations.push(toCheckAnnotation(err));
              }
            }

            const validPrefixes = ['epic/', 'plan/', ...execPrefixes, 'main', 'master'];
            const hasValidPrefix = validPrefixes.some(p => branch.startsWith(p) || branch === p);
            if (!hasValidPrefix && branch !== context.payload.repository.default_branch) {
              const err = new SddError('SDD-013', { file: 'branch', line: 1 });
              annotations.push(toCheckAnnotation(err));
            }

            const checkName = 'SDD Preflight';
            const conclusion = errors.length > 0 ? 'neutral' : 'success';
            const title = errors.length > 0
              ? `${errors.length} preflight issue(s) found`
              : 'Preflight checks passed';

            const summary = errors.length > 0
              ? errors.map(e => `- ${e}`).join('\n')
              : 'All config files, branch naming, and PR metadata look valid.';

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: checkName,
              head_sha: pr.head.sha,
              status: 'completed',
              conclusion,
              output: {
                title,
                summary,
                annotations: annotations.slice(0, 50),
              },
            });

  secrets:
    name: Secrets Availability
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Check required secrets
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const annotations = [];
            const missingSecrets = [];
            const missingVars = [];

            const checkSecret = (name, required, envVar) => {
              const present = !!envVar;
              if (!present && required) {
                missingSecrets.push(name);
              }
              return present;
            };

            const checkVar = (name, required, envVar) => {
              const present = !!envVar && envVar !== '';
              if (!present && required) {
                missingVars.push(name);
              }
              return present;
            };

            checkSecret('HUB_CROSS_REPO_TOKEN', true, process.env.HUB_CROSS_REPO_TOKEN);
            checkSecret('JIRA_BASE_URL', false, process.env.JIRA_BASE_URL);
            checkSecret('JIRA_API_TOKEN', false, process.env.JIRA_API_TOKEN);
            checkSecret('JIRA_USER_EMAIL', false, process.env.JIRA_USER_EMAIL);

            checkVar('HUB_REPO', true, process.env.HUB_REPO);

            const issues = [];
            if (missingSecrets.length > 0) {
              issues.push(`Missing required secrets: ${missingSecrets.join(', ')}`);
            }
            if (missingVars.length > 0) {
              issues.push(`Missing required variables: ${missingVars.join(', ')}`);
            }

            const pr = context.payload.pull_request;

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'SDD Secrets Check',
              head_sha: pr.head.sha,
              status: 'completed',
              conclusion: issues.length > 0 ? 'neutral' : 'success',
              output: {
                title: issues.length > 0
                  ? `${issues.length} secret/variable issue(s)`
                  : 'Secrets configured',
                summary: issues.length > 0
                  ? issues.join('\n') + '\n\n_This is advisory. Automation will skip features requiring missing secrets._'
                  : 'Required secrets and variables are available in this repository.',
              },
            });
