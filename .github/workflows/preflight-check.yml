name: Preflight Check

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: ['**']

permissions:
  contents: read
  checks: write

jobs:
  detect-sdd:
    runs-on: ubuntu-latest
    outputs:
      is_sdd: ${{ steps.check.outputs.is_sdd }}
    steps:
      - name: Checkout hub
        uses: actions/checkout@v4

      - id: check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = require('./bin/workflow-scripts/preflight-check');
            return await workflow.detectSddPR({ context, core });

  config:
    name: Config & Secrets Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate config files
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = require('./bin/workflow-scripts/preflight-check');
            return await workflow.validateConfigFiles({
              github, context, core,
              inputs: { isSdd: '${{ needs.detect-sdd.outputs.is_sdd }}' },
            });

  secrets:
    name: Secrets Availability
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Check required secrets
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = require('./bin/workflow-scripts/preflight-check');
            return await workflow.checkRequiredSecrets({ github, context, core });
