# config/repos.yaml — Repository Registry
# ─────────────────────────────────────────────────────────────────────────────
# Source of truth for all repositories managed by this hub.
# Agents and bin/dev read this to understand the deployment landscape.
# ─────────────────────────────────────────────────────────────────────────────

repositories:
  sdd-test-api:
    display_name: "SDD Test API"
    description: "Backend API for the cross-repo greeting test"
    git_url: "https://github.com/ecarrizo2/sdd-test-api.git"
    submodule_path: "repos/sdd-test-api"

    branches:
      main: "main"
      production: null
      staging: null

    tech_stack:
      language: javascript
      framework: express
      package_manager: npm

    sdd:
      has_own_sdd: false
      agent_specs_path: null
      architecture_docs_path: null

  sdd-test-frontend:
    display_name: "SDD Test Frontend"
    description: "React frontend that consumes the API greeting endpoint"
    git_url: "https://github.com/ecarrizo2/sdd-test-frontend.git"
    submodule_path: "repos/sdd-test-frontend"

    branches:
      main: "main"
      production: null
      staging: null

    tech_stack:
      language: javascript
      framework: react
      package_manager: npm

    sdd:
      has_own_sdd: false
      agent_specs_path: null
      architecture_docs_path: null

topology:
  dependencies:
    sdd-test-frontend:
      depends_on: [sdd-test-api]
      interface: "REST"
