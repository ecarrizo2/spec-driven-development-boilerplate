# config/repos.yaml — Repository Registry
# ─────────────────────────────────────────────────────────────────────────────
# Source of truth for all repositories managed by this hub.
# Agents and bin/dev read this to understand the deployment landscape.
#
# TEMPLATE: Replace the examples below with your actual repos during bootstrap.
# ─────────────────────────────────────────────────────────────────────────────

repositories:
  # ─── EXAMPLE: Backend API ─────────────────────────────────────────────────
  example-api:
    display_name: "Example API"
    description: "Backend microservice (replace with your actual service)"
    git_url: "git@github.com:your-org/example-api.git"
    submodule_path: "repos/example-api"

    branches:
      main: "main"
      production: null
      staging: null

    deployment:
      system: helm
      pipeline: gha
      pipeline_file: ".github/workflows/deploy.yml"
      environments:
        - name: staging
          auto_deploy_on: "staging"
          url: "https://staging-api.example.com"
          requires_approval: false
        - name: production
          auto_deploy_on: null
          url: "https://api.example.com"
          requires_approval: true

    tech_stack:
      language: typescript
      framework: nestjs
      package_manager: pnpm
      database: postgresql
      orm: prisma

    sdd:
      has_own_sdd: true
      agent_specs_path: "sdd/agent-development/agent-specs/"
      architecture_docs_path: "architecture-documentation/"

    health_checks:
      - url: "https://api.example.com/health"
        method: GET
        expected_status: 200

  # ─── EXAMPLE: Frontend ────────────────────────────────────────────────────
  example-frontend:
    display_name: "Example Frontend"
    description: "React frontend (replace with your actual app)"
    git_url: "git@github.com:your-org/example-frontend.git"
    submodule_path: "repos/example-frontend"

    branches:
      main: "main"
      production: null
      staging: null

    deployment:
      system: static
      pipeline: gha
      pipeline_file: ".github/workflows/deploy.yml"
      environments:
        - name: preview
          auto_deploy_on: "pr"
          url: null
          requires_approval: false
        - name: production
          auto_deploy_on: "main"
          url: "https://app.example.com"
          requires_approval: true

    tech_stack:
      language: typescript
      framework: react
      package_manager: pnpm

    sdd:
      has_own_sdd: false
      agent_specs_path: null
      architecture_docs_path: null

  # ─── EXAMPLE: Infrastructure ──────────────────────────────────────────────
  example-infra:
    display_name: "Infrastructure (IaC)"
    description: "Terraform/CDK for shared infrastructure (replace with your actual IaC repo)"
    git_url: "git@github.com:your-org/example-infra.git"
    submodule_path: "repos/example-infra"

    branches:
      main: "main"
      production: null

    deployment:
      system: manual
      pipeline: gha
      pipeline_file: ".github/workflows/terraform.yml"
      environments:
        - name: staging
          auto_deploy_on: null
          requires_approval: true
        - name: production
          auto_deploy_on: null
          requires_approval: true

    tech_stack:
      language: hcl
      framework: terraform
      package_manager: null

    sdd:
      has_own_sdd: false
      agent_specs_path: null
      architecture_docs_path: null

# ─────────────────────────────────────────────────────────────────────────────
# Cross-repo dependency topology
# Defines runtime dependencies between services (for deployment ordering context)
# ─────────────────────────────────────────────────────────────────────────────
topology:
  dependencies:
    example-frontend:
      depends_on: [example-api]
      interface: "REST/GraphQL"
    example-api:
      depends_on: [example-infra]
      interface: "infrastructure"
