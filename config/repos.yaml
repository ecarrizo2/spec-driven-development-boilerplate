# config/repos.yaml — Repository Registry
# ─────────────────────────────────────────────────────────────────────────────
# Source of truth for all repositories managed by this hub.
# Agents and bin/dev read this to understand the deployment landscape.
#
# TEMPLATE: Replace the examples below with your actual repos during bootstrap.
# ─────────────────────────────────────────────────────────────────────────────

repositories:
  sdd-test-api:
    display_name: "Test API"
    description: "Test backend service"
    git_url: "https://github.com/ecarrizo2/sdd-test-api.git"
    submodule_path: "repos/sdd-test-api"

    branches:
      main: "main"
      production: null
      staging: null

    deployment:
      system: manual
      pipeline: gha
      pipeline_file: ".github/workflows/deploy.yml"
      environments:
        - name: test
          auto_deploy_on: null
          url: null
          requires_approval: false

    tech_stack:
      language: typescript
      framework: nodejs
      package_manager: npm

    sdd:
      has_own_sdd: false
      agent_specs_path: null
      architecture_docs_path: null

  sdd-test-frontend:
    display_name: "Test Frontend"
    description: "Test frontend application"
    git_url: "https://github.com/ecarrizo2/sdd-test-frontend.git"
    submodule_path: "repos/sdd-test-frontend"

    branches:
      main: "main"
      production: null
      staging: null

    deployment:
      system: static
      pipeline: gha
      pipeline_file: ".github/workflows/deploy.yml"
      environments:
        - name: test
          auto_deploy_on: null
          url: null
          requires_approval: false

    tech_stack:
      language: typescript
      framework: react
      package_manager: npm

    sdd:
      has_own_sdd: false
      agent_specs_path: null
      architecture_docs_path: null

topology:
  dependencies:
    sdd-test-frontend:
      depends_on: [sdd-test-api]
      interface: "REST"
