# ─────────────────────────────────────────────────────────────────────────────
# Team & Project Configuration
# ─────────────────────────────────────────────────────────────────────────────
# This file is read by bin/dev commands and agent prompts.
# Customize for your team, Jira project, and branching conventions.
# ─────────────────────────────────────────────────────────────────────────────

teams:
  your-team:
    display_name: "Your Team Name"

    jira:
      project_key: "PROJ"          # Your Jira project key
      board_id: null               # Sprint board ID (optional)
      issue_types:
        epic: "Epic"
        task: "Story"              # What issue type tasks become
        bug: "Bug"
        subtask: "Sub-task"
      mandatory_fields:
        - summary
        - description
        - priority
      default_values:
        priority: "Minor"
        labels: []

    branching:
      base_branch: "main"          # or "develop", "master", etc.
      ticket_id_pattern: "[A-Z][A-Z0-9]+-\\d+"
      branch_format: "<type>/<ticket-id>-<short-description>"
      branch_types: [feat, fix, chore, hotfix, refactor, docs, ci]

    conventions:
      commit_co_author: "Copilot <noreply@github.com>"
      pr_merge_strategy: "squash"  # squash | merge | rebase
      pr_draft_by_default: true

active_team: "your-team"
