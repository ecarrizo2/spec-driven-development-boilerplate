# ─────────────────────────────────────────────────────────────────────────────
# Plan Manifest — YAML Schema Reference (Format Version 2.0)
# ─────────────────────────────────────────────────────────────────────────────
# This file documents the expected structure of manifest.yaml.
# It is NOT a JSON Schema — it's a human-readable reference showing:
#   - Every valid field and its type
#   - Allowed values (enums)
#   - Which fields are required vs optional
#
# Use this to validate manifests manually or to build tooling.
#
# ⚠️  Keep in sync with agent-development/plans/_templates/manifest.yaml
# ─────────────────────────────────────────────────────────────────────────────

_schema_version: "2.0"

plan_metadata:
  _required: true
  task_id:
    type: integer
    required: true
    description: "Must match originating request number"
  task_name:
    type: string
    required: true
    description: "Must match request filename (kebab-case)"
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
  status:
    type: enum
    required: true
    values: [draft, pending-approval, approved, in-progress, done, failed, paused]
  complexity:
    type: enum
    required: true
    values: [1, 2, 3, 5, 8, 13]
    description: "Fibonacci scale — inherited from request"
  total_stages:
    type: integer
    required: true
    minimum: 1
  current_stage:
    type: integer
    required: true
    minimum: 0
  created:
    type: date
    required: true
    format: "YYYY-MM-DD"
  last_updated:
    type: date
    required: true
    format: "YYYY-MM-DD"
  api_checkpoint:
    type: boolean
    required: false
    default: false
    description: "Inherited from request; true if any stage changes observable API behavior"

  approval:
    _required: true
    status:
      type: enum
      required: true
      values: [pending, approved, changes-requested]
    approved_by:
      type: string
      required: false
      description: "Name of the approver (filled when approved)"
    approved_at:
      type: date
      required: false
      format: "YYYY-MM-DD"
    notes:
      type: string
      required: false
      description: "Human notes on approval or change requests"

dependencies:
  _required: true
  required_tasks:
    type: array
    items: integer
    description: "Task IDs that must be done before execution"
  packages:
    type: array
    items: string
    description: "New dependencies to install"
  affected_modules:
    type: array
    items: string
    description: "Project modules this plan touches"

# ─────────────────────────────────────────────────────────────────────────────
# Dependency Mapping (v2.0 — optional)
# ─────────────────────────────────────────────────────────────────────────────
# Use when the plan introduces or modifies cross-file public contracts.
# Skip for plans with no new public interfaces or type changes.
dependency_mapping:
  _required: false
  contracts:
    type: array
    required: false
    items:
      file:
        type: string
        required: true
        description: "Relative path to the file containing the contract"
      signatures:
        type: array
        items: string
        required: false
        description: "Function/method signatures introduced or modified"
      types:
        type: array
        items: string
        required: false
        description: "Interface/type/schema definitions introduced or modified"

# ─────────────────────────────────────────────────────────────────────────────
# Delivery (standalone tasks only)
# ─────────────────────────────────────────────────────────────────────────────
# For epic tasks, delivery info lives in the epic's delivery.yaml instead.
delivery:
  _required: false
  branch:
    type: string
    required: false
    description: "e.g., feat/PROJ-123-add-user-notifications"
  pr_url:
    type: string
    required: false
    description: "e.g., https://github.com/org/repo/pull/123"
  pr_number:
    type: integer
    required: false
  pr_status:
    type: enum
    required: false
    values: [planned, branched, draft-pr, in-progress, ready-for-review, merged]

stages:
  _required: true
  type: array
  min_items: 1
  items:
    stage_id:
      type: integer
      required: true
    name:
      type: string
      required: true
    description:
      type: string
      required: true
    instruction_file:
      type: string
      required: true
      pattern: "^\\d+-[a-z0-9-]+\\.md$"
    status:
      type: enum
      required: true
      values: [todo, in-progress, done, skipped, failed]
    complexity:
      type: enum
      required: true
      values: [1, 2, 3, 5, 8]
      description: "Fibonacci — stage-level (13 is too large for a stage)"
    api_checkpoint:
      type: boolean
      required: false
      default: false
      description: "true if this stage changes observable API behavior (pauses for human verification)"
    context_files:
      type: array
      items: string
      required: true
      description: "Files the agent must read before starting"
    output_files:
      type: array
      items: string
      required: true
      description: "Files the agent will create or modify"
    verification_commands:
      type: array
      items: string
      required: true
      description: "Commands to run after completion (can be empty)"
    rollback_plan:
      type: string
      required: true
      description: "Steps to undo this stage if it fails"

# ─────────────────────────────────────────────────────────────────────────────
# Valid Status Transitions
# ─────────────────────────────────────────────────────────────────────────────
_transitions:
  plan_metadata.status:
    draft: [pending-approval]
    pending-approval: [approved, draft]
    approved: [in-progress]
    in-progress: [done, failed, paused]
    paused: [in-progress, draft]
    failed: [draft, paused]
    done: []  # terminal

  plan_metadata.approval.status:
    pending: [approved, changes-requested]
    changes-requested: [pending, approved]
    approved: []  # terminal (unless plan is reset to draft)

  delivery.pr_status:
    planned: [branched]
    branched: [draft-pr]
    draft-pr: [in-progress]
    in-progress: [ready-for-review]
    ready-for-review: [merged]
    merged: []  # terminal

  stages[].status:
    todo: [in-progress, skipped]
    in-progress: [done, failed, skipped]
    done: []      # terminal
    skipped: []   # terminal
    failed: []    # terminal
